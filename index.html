<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>Qurated — Growth Systems Agency Perth</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preload" as="image" href="logo_long_white.png"/>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;500;600;700&display=swap" onload="this.rel='stylesheet'"/><noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;500;600;700&display=swap"/></noscript>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="cover-page">
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<div class="cover-wrap">
  <div class="cover-grid"></div>
  <div class="cover-logo-wrap">
    <img src="logo_long_white.png" alt="Qurated" width="280" height="40"/>
    <p class="cover-tagline">Growth Systems Agency — Perth, WA</p>
  </div>
  <div class="cover-bottom">
    <div class="cover-line"></div>
    <a href="home" class="cover-btn">Welcome to Qurated</a>
  </div>
</div>

<!-- QUINN on cover — minimal, delayed proactive -->
<script>const QUINN_PAGE='cover';</script>
<div class="quinn-bubble" id="quinn-bubble">
  <div class="q-proactive" id="q-proactive" onclick="openQuinn()">Not sure where to start? Ask Quinn →</div>
  <div class="q-panel" id="q-panel">
    <div class="q-hd"><div class="q-av">Q</div><div><div class="q-nm">Quinn</div><div class="q-st">Online now · Qurated AI</div></div></div>
    <div class="q-msgs" id="q-msgs"><div class="q-typing" id="q-typing"><span></span><span></span><span></span></div></div>
    <div class="q-chips hidden" id="q-chips"></div>
    <div class="q-input-row"><input class="q-input" id="q-input" type="text" placeholder="Ask me anything..." autocomplete="off"/><button class="q-send" id="q-send" aria-label="Send">→</button></div>
  </div>
  <button class="q-toggle" id="q-toggle" aria-label="Chat with Quinn"><span class="q-toggle-q">Q</span><span class="q-badge"></span></button>
</div>

<script src="main.js" defer></script>
<script src="quinn-widget.js" defer></script>
</body>
</html>
